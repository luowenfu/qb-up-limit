<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>qB - 达量限速管理</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=2025062283">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="app-shell">
            <header class="app-topbar">
                <div class="topbar-brand">
                    <div class="topbar-logo" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 3v10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                            <path d="M8.5 6.5L12 3l3.5 3.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M5 14h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                            <path d="M7 17h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                            <path d="M9 20h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="topbar-titles">
                        <h1 class="topbar-title">qB 达量限速管理<span class="topbar-app-id">qb-up-limit</span></h1>
                        <p class="topbar-subtitle">流量监控 · 周期达量 · 自动限速<a href="https://github.com/luowenfu/qb-up-limit" class="topbar-github-link" target="_blank" rel="noopener noreferrer" title="GitHub 仓库" aria-label="GitHub 仓库"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg></a><span class="topbar-version" id="topbarVersion"></span></p>
                    </div>
                </div>

                <div class="topbar-stats" id="headerStats" aria-label="系统状态摘要">
                    <div class="topbar-stats-row topbar-stats-row--qb">
                        <div class="stat-pill stat-pill--total stat-pill--compact" title="已配置 qB 设备总数">
                            <span class="stat-pill-value" id="statTotal">0</span>
                            <span class="stat-pill-label">设备</span>
                        </div>
                        <div class="stat-pill stat-pill--online stat-pill--compact" title="当前在线 qB 设备">
                            <span class="stat-pill-dot" aria-hidden="true"></span>
                            <span class="stat-pill-value" id="statOnline">0</span>
                            <span class="stat-pill-label">在线</span>
                        </div>
                        <div class="stat-pill stat-pill--limited stat-pill--compact" title="当前处于限速状态的设备">
                            <span class="stat-pill-dot" aria-hidden="true"></span>
                            <span class="stat-pill-value" id="statLimited">0</span>
                            <span class="stat-pill-label">限速中</span>
                        </div>
                        <div class="stat-pill stat-pill--next-plan stat-pill--compact" title="已配置下周期计划的设备">
                            <span class="stat-pill-dot" aria-hidden="true"></span>
                            <span class="stat-pill-value" id="statNextPlan">0</span>
                            <span class="stat-pill-label">下周期计划</span>
                        </div>
                    </div>
                    <div class="topbar-stats-row topbar-stats-row--emby" id="topbarStatsEmby" hidden aria-hidden="true">
                        <div class="stat-pill stat-pill--total stat-pill--compact" title="已配置 Emby 设备总数">
                            <span class="stat-pill-value" id="statEmbyTotal">0</span>
                            <span class="stat-pill-label">设备</span>
                        </div>
                        <div class="stat-pill stat-pill--online stat-pill--compact" title="API 在线的 Emby 设备">
                            <span class="stat-pill-dot" aria-hidden="true"></span>
                            <span class="stat-pill-value" id="statEmbyOnline">0</span>
                            <span class="stat-pill-label">在线</span>
                        </div>
                        <div class="stat-pill stat-pill--limited stat-pill--compact" title="局域网当前播放会话数">
                            <span class="stat-pill-dot" aria-hidden="true"></span>
                            <span class="stat-pill-value" id="statEmbyLanPlay">0</span>
                            <span class="stat-pill-label">局域网播放</span>
                        </div>
                        <div class="stat-pill stat-pill--next-plan stat-pill--compact" title="外网当前播放会话数">
                            <span class="stat-pill-dot" aria-hidden="true"></span>
                            <span class="stat-pill-value" id="statEmbyWanPlay">0</span>
                            <span class="stat-pill-label">外网播放</span>
                        </div>
                    </div>
                </div>

                <div class="topbar-actions">
                    <div class="topbar-refresh" id="refreshBadge" title="自动刷新倒计时">
                        <div class="refresh-ring">
                            <svg class="refresh-ring-svg" viewBox="0 0 36 36" aria-hidden="true">
                                <circle class="refresh-ring-track" cx="18" cy="18" r="15.5" fill="none" stroke-width="3"/>
                                <circle class="refresh-ring-progress" id="refreshRingProgress" cx="18" cy="18" r="15.5" fill="none" stroke-width="3"
                                    stroke-dasharray="97.4" stroke-dashoffset="0" transform="rotate(-90 18 18)"/>
                            </svg>
                            <span id="refreshSeconds" class="refresh-seconds">5</span>
                        </div>
                        <div class="refresh-meta">
                            <span class="refresh-label">自动刷新</span>
                            <span id="refreshHint" class="refresh-hint">剩余 5 秒</span>
                        </div>
                    </div>
                    <div class="topbar-time" title="当前时间">
                        <svg class="topbar-time-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.6"/>
                            <path d="M10 6v4.5l3 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span id="currentTime" class="topbar-time-value">--</span>
                    </div>
                    <button type="button" class="topbar-btn topbar-btn--icon" onclick="openGlobalSettings()" title="全局设置" aria-label="全局设置">
                        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M10.18 2.5h-.36a1.67 1.67 0 0 0-1.67 1.67v.15a1.67 1.67 0 0 1-.83 1.44l-.36.21a1.67 1.67 0 0 1-1.67 0l-.12-.07a1.67 1.67 0 0 0-2.28.61l-.18.32a1.67 1.67 0 0 0 .61 2.28l.12.08a1.67 1.67 0 0 1 .83 1.44v.42a1.67 1.67 0 0 1-.83 1.45l-.12.08a1.67 1.67 0 0 0-.61 2.28l.18.32a1.67 1.67 0 0 0 2.28.61l.12-.08a1.67 1.67 0 0 1 1.67 0l.36.21a1.67 1.67 0 0 1 .83 1.44V16.67a1.67 1.67 0 0 0 1.67 1.67h.36a1.67 1.67 0 0 0 1.67-1.67v-.15a1.67 1.67 0 0 1 .83-1.44l.36-.21a1.67 1.67 0 0 1 1.67 0l.12.07a1.67 1.67 0 0 0 2.28-.61l.18-.32a1.67 1.67 0 0 0-.61-2.28l-.12-.08a1.67 1.67 0 0 1-.83-1.45v-.42a1.67 1.67 0 0 1 .83-1.44l.12-.08a1.67 1.67 0 0 0 .61-2.28l-.18-.32a1.67 1.67 0 0 0-2.28-.61l-.12.08a1.67 1.67 0 0 1-1.67 0l-.36-.21a1.67 1.67 0 0 1-.83-1.44V4.17a1.67 1.67 0 0 0-1.67-1.67z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                            <circle cx="10" cy="10" r="2.3" stroke="currentColor" stroke-width="1.6"/>
                        </svg>
                    </button>
                    <button type="button" class="topbar-btn topbar-btn--logout" onclick="logout()">退出</button>
                </div>
            </header>

            <nav class="app-navbar" aria-label="主导航">
                <button type="button" class="navbar-action navbar-action--leading" onclick="openAddDeviceChooser()">
                    <svg class="navbar-action-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>添加设备</span>
                </button>
                <div class="navbar-tabs">
                    <button type="button" class="nav-tab" data-tab="devices" onclick="switchTab('devices')">
                        <svg class="nav-tab-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <rect x="2.5" y="3" width="15" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M7 17h6M10 14v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span class="nav-tab-label">设备管理</span>
                    </button>
                    <button type="button" class="nav-tab" data-tab="stats" onclick="switchTab('stats')">
                        <svg class="nav-tab-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M3 16V10M7 16V6M11 16V9M15 16V4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        <span class="nav-tab-label">流量图表</span>
                    </button>
                    <span class="navbar-divider" aria-hidden="true"></span>
                    <button type="button" class="nav-tab" data-tab="events" onclick="switchTab('events')">
                        <svg class="nav-tab-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M4 4h12v10H4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M7 8h6M7 11h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span class="nav-tab-label">事件日志</span>
                    </button>
                    <button type="button" class="nav-tab" data-tab="syslogs" onclick="switchTab('syslogs')">
                        <svg class="nav-tab-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M5 4h10v12H5z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M7.5 8h5M7.5 11h5M7.5 14h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span class="nav-tab-label">系统日志</span>
                    </button>
                </div>
                <div id="deviceViewSwitch" class="device-view-switch" role="group" aria-label="设备视图" hidden>
                    <div class="device-view-segments">
                        <button type="button" class="device-view-btn" data-device-view="qb" aria-pressed="false" onclick="onDeviceViewSwitch('qb')" title="qB 设备">
                            <svg class="device-view-btn-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                <path d="M10 3v9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                                <path d="M7 6l3-3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M4 14h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                                <path d="M6 17h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                            </svg>
                            <span class="device-view-btn-label">qB</span>
                        </button>
                        <button type="button" class="device-view-btn device-view-btn--emby" data-device-view="emby" aria-pressed="false" onclick="onDeviceViewSwitch('emby')" title="Emby 设备">
                            <svg class="device-view-btn-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                <rect x="3" y="4.5" width="14" height="9.5" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
                                <path d="M8.5 8.2v3.6l3.8-1.8-3.8-1.8z" fill="currentColor"/>
                            </svg>
                            <span class="device-view-btn-label">Emby</span>
                        </button>
                        <span class="device-view-segment-indicator" aria-hidden="true"></span>
                    </div>
                    <span class="device-view-toolbar-divider" aria-hidden="true"></span>
                    <div class="device-merge-edit-wrap" id="deviceMergeEditWrap">
                        <button type="button" class="device-merge-btn" id="deviceMergeEditBtn" aria-label="合并显示" title="合并显示 qB 与 Emby 设备" aria-expanded="false" aria-haspopup="dialog" aria-pressed="false" onclick="toggleMergeDevicesPopover(event)">
                            <svg class="device-merge-btn-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                <rect x="2.5" y="4" width="6.5" height="12" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="11" y="4" width="6.5" height="12" rx="1.2" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                            <span class="device-merge-btn-label">合并</span>
                        </button>
                        <div id="mergeDevicesPopover" class="merge-devices-popover" role="dialog" aria-label="合并显示设备选择" hidden></div>
                    </div>
                </div>
            </nav>
            <script src="/static/js/nav-boot.js?v=2025062030"></script>
        </div>

        <section id="tab-devices" class="tab-panel">
            <div id="devicesMergeLayout" class="devices-merge-layout" hidden>
                <div class="devices-merge-grid">
                    <div class="devices-merge-column devices-merge-column--qb">
                        <div id="instanceCards" class="instance-cards"></div>
                    </div>
                    <div class="devices-merge-column devices-merge-column--emby">
                        <div id="embyInstanceCardsMerge" class="instance-cards"></div>
                    </div>
                    <div id="devicesMergeDividers" class="devices-merge-dividers" aria-hidden="true"></div>
                </div>
            </div>
            <div id="devicesSingleLayout">
                <div id="instanceCardsSingle" class="instance-cards"></div>
            </div>
        </section>

        <section id="tab-stats" class="tab-panel">
            <div class="stats-tab-panel">
            <div class="chart-section">
                <div class="chart-section-header">
                    <div class="chart-filter-panel">
                        <div class="chart-filter-head">
                            <div class="log-filter-head-main">
                                <h2 class="chart-section-title">流量图表</h2>
                                <button type="button" class="log-filter-head-refresh-btn" onclick="refreshTrafficChart()" aria-label="刷新" title="刷新">
                                    <svg class="log-filter-head-refresh-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                        <path d="M13 3v3h-3M3 13v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M3.6 6.4A4.4 4.4 0 0 1 10.8 4.2L13 3M12.4 9.6A4.4 4.4 0 0 1 5.2 11.8L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="chart-filter-head-right">
                                <div class="chart-hint-area">
                                    <p id="chartBackfillHint" class="chart-backfill-hint" hidden>柱状图斜线区域为设备重新上线后补录的流量</p>
                                    <p id="chartPieHint" class="chart-backfill-hint" hidden>饼状图时段过多影响阅读性，建议缩小时段</p>
                                    <p id="chartZoomHint" class="chart-backfill-hint" hidden>支持鼠标滚轮/双指缩放、拖拽横向滚动查看详情</p>
                                </div>
                            </div>
                        </div>
                        <div class="chart-filter-body">
                            <div class="chart-filter-row chart-filter-row--selects">
                                <label class="chart-control chart-control--device-type">
                                    <span class="chart-control-label">设备类型</span>
                                    <select id="chartDeviceType" data-device-type-filter disabled onchange="onDeviceTypeFilterChange(this)">
                                        <option value="qb">qB 设备</option>
                                        <option value="emby">Emby 设备</option>
                                    </select>
                                </label>
                                <label class="chart-control">
                                    <span class="chart-control-label">设备名称</span>
                                    <select id="chartInstance" onchange="onChartInstanceChange()">
                                        <option value="__all__" selected>全部设备</option>
                                    </select>
                                </label>
                                <label class="chart-control platform-panel platform-panel--emby" data-platform-panel="emby" hidden aria-hidden="true">
                                    <span class="chart-control-label">外网用户</span>
                                    <select id="chartPlaybackUser" onchange="onChartPlaybackUserChange()">
                                        <option value="__device__">整个设备</option>
                                        <option value="__all_users__">全部用户</option>
                                    </select>
                                </label>
                                <label class="chart-control">
                                    <span class="chart-control-label">统计周期</span>
                                    <select id="chartPeriod" onchange="onChartPeriodChange()">
                                        <option value="hourly">按小时</option>
                                        <option value="daily">按天</option>
                                        <option value="monthly">按月</option>
                                        <option value="yearly">按年</option>
                                        <option value="cycle">按设备周期</option>
                                    </select>
                                </label>
                            </div>
                            <div class="chart-filter-row chart-filter-row--range">
                                <div class="chart-control--range-wrap">
                                    <div class="chart-range-label-card">
                                        <span class="chart-control-label">时间范围</span>
                                        <label class="chart-range-custom">
                                            <input type="checkbox" id="chartUseCustomRange" onchange="onChartRangeToggle()" />
                                            <span>自定义</span>
                                        </label>
                                    </div>
                                    <div id="chartRangeSide" class="chart-range-side fields-collapsed" aria-hidden="true" hidden>
                                        <div class="chart-range-fields is-collapsed" aria-hidden="true">
                                            <span class="chart-range-point chart-range-point--start">
                                                <input type="date" id="chartRangeStart" class="chart-range-input chart-range-input--date" disabled onchange="onChartRangeStartChange()" />
                                                <input type="month" id="chartRangeStartMonth" class="chart-range-input chart-range-input--month" disabled hidden onchange="onChartRangeStartChange()" />
                                                <input type="number" id="chartRangeStartYear" class="chart-range-input chart-range-input--year" disabled hidden onchange="onChartRangeStartChange()" />
                                                <select id="chartRangeStartHour" class="chart-range-hour" disabled hidden onchange="onChartRangeChange()"></select>
                                            </span>
                                            <span class="chart-range-sep" id="chartRangeSep">至</span>
                                            <span class="chart-range-point chart-range-point--end">
                                                <input type="date" id="chartRangeEnd" class="chart-range-input chart-range-input--date" disabled onchange="onChartRangeEndChange()" />
                                                <input type="month" id="chartRangeEndMonth" class="chart-range-input chart-range-input--month" disabled hidden onchange="onChartRangeEndChange()" />
                                                <input type="number" id="chartRangeEndYear" class="chart-range-input chart-range-input--year" disabled hidden onchange="onChartRangeEndChange()" />
                                                <select id="chartRangeEndHour" class="chart-range-hour" disabled hidden onchange="onChartRangeChange()"></select>
                                            </span>
                                            <span id="chartRangeCycleWrap" class="chart-range-cycle" hidden>
                                                <span>前</span>
                                                <input type="number" id="chartRangeCycles" class="chart-range-input chart-range-input--cycles" min="1" max="50" value="12" disabled onchange="onChartRangeChange()" />
                                                <span>个周期</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="chart-filter-row chart-filter-row--quick">
                                <div id="chartRangeQuickWrap" class="chart-range-quick">
                                    <div id="chartRangeQuickButtons" class="chart-range-quick-buttons" role="group" aria-label="快捷时间选择"></div>
                                </div>
                                <div class="chart-type-switch" role="group" aria-label="图表类型">
                                    <button type="button" class="chart-type-btn active" data-chart-type="bar" aria-pressed="true" onclick="onChartTypeChange('bar')">柱状图</button>
                                    <button type="button" class="chart-type-btn" data-chart-type="line" aria-pressed="false" onclick="onChartTypeChange('line')">曲线图</button>
                                    <button type="button" class="chart-type-btn" data-chart-type="pie" aria-pressed="false" onclick="onChartTypeChange('pie')">饼状图</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="chartLegendPanel" class="chart-legend-panel" hidden>
                    <h3 id="chartInstanceTitle" class="chart-instance-title"></h3>
                    <div class="chart-legend-side">
                        <div class="chart-legend-totals">
                            <span id="chartLegendTotalUpload" class="chart-legend-total chart-legend-total--upload" data-chart-dataset="0">上传合计：<span class="chart-legend-total-value">0.0 GB</span></span>
                            <span id="chartLegendTotalDownload" class="chart-legend-total chart-legend-total--download" data-chart-dataset="1">下载合计：<span class="chart-legend-total-value">0.0 GB</span></span>
                        </div>
                        <div class="chart-legend-divider" aria-hidden="true"></div>
                        <div class="chart-legend-group">
                            <div class="chart-legend-items">
                                <button type="button" class="chart-legend-item" data-chart-dataset="0" aria-pressed="true">
                                    <i class="chart-legend-dot chart-legend-dot--upload" aria-hidden="true"></i>
                                    <span>上行</span>
                                </button>
                                <button type="button" class="chart-legend-item" data-chart-dataset="1" aria-pressed="true">
                                    <i class="chart-legend-dot chart-legend-dot--download" aria-hidden="true"></i>
                                    <span>下行</span>
                                </button>
                            </div>
                            <p class="chart-legend-hint">点击可隐藏对应数据</p>
                        </div>
                    </div>
                </div>
                <div class="chart-area">
                    <button type="button" id="chartFullscreenEnter" class="chart-fullscreen-btn chart-fullscreen-btn--enter" hidden aria-label="全屏查看图表">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div id="chartEmpty" class="chart-empty">
                        <svg class="chart-empty-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="28" width="8" height="16" rx="2" fill="#cbd5e1"/>
                            <rect x="16" y="18" width="8" height="26" rx="2" fill="#cbd5e1"/>
                            <rect x="28" y="22" width="8" height="22" rx="2" fill="#cbd5e1"/>
                            <rect x="40" y="10" width="8" height="34" rx="2" fill="#cbd5e1"/>
                        </svg>
                        <p class="chart-empty-text">暂无设备</p>
                    </div>
                    <div id="chartContainer" class="chart-container" hidden>
                        <div id="chartBarLineLayout" class="chart-layout">
                            <div class="chart-y-axis-panel">
                                <div class="chart-y-axis-slot">
                                    <div id="chartYAxisLabels" class="chart-y-axis-labels"></div>
                                    <div id="chartYAxisUnit" class="chart-y-axis-unit" hidden>(GB)</div>
                                </div>
                                <div class="chart-scrollbar-gap" aria-hidden="true"></div>
                            </div>
                            <div class="chart-main-col">
                                <div class="chart-scroll-wrap">
                                    <div class="chart-canvas-wrap">
                                        <canvas id="trafficChart"></canvas>
                                    </div>
                                </div>
                                <div class="chart-scrollbar-gap" aria-hidden="true">
                                    <div class="chart-hscroll-rail" hidden aria-hidden="true">
                                        <div class="chart-hscroll-rail-thumb"></div>
                                    </div>
                                </div>
                            </div>
                            <div id="chartXAxisTitle" class="chart-x-axis-title"></div>
                        </div>
                        <div id="chartPieLayout" class="chart-pie-layout" hidden>
                            <div class="chart-pie-group chart-pie-group--upload">
                                <div class="chart-pie-header">
                                    <i class="chart-legend-dot chart-legend-dot--upload" aria-hidden="true"></i>
                                    <span>上行流量分布</span>
                                </div>
                                <div class="chart-pie-canvas-wrap">
                                    <canvas id="trafficPieUpChart"></canvas>
                                </div>
                            </div>
                            <div class="chart-pie-group chart-pie-group--download">
                                <div class="chart-pie-header">
                                    <i class="chart-legend-dot chart-legend-dot--download" aria-hidden="true"></i>
                                    <span>下行流量分布</span>
                                </div>
                                <div class="chart-pie-canvas-wrap">
                                    <canvas id="trafficPieDlChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="chartFullscreenPortal" class="chart-fullscreen-portal" hidden>
                    <button type="button" id="chartFullscreenExit" class="chart-fullscreen-btn chart-fullscreen-btn--exit" aria-label="退出全屏">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M9 9L5 5M19 5l-4 4M5 19l4-4M19 19l-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <div id="chartFullscreenContent" class="chart-fullscreen-content"></div>
                </div>
            </div>
            </div>
        </section>

        <section id="tab-events" class="tab-panel">
            <div class="events-section">
                <div class="log-filter-panel">
                    <div class="log-filter-head">
                        <div class="log-filter-head-main">
                            <h2 class="log-section-title">事件日志</h2>
                            <button type="button" class="log-filter-head-refresh-btn" onclick="refreshEventsLog()" aria-label="刷新" title="刷新">
                                <svg class="log-filter-head-refresh-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M13 3v3h-3M3 13v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M3.6 6.4A4.4 4.4 0 0 1 10.8 4.2L13 3M12.4 9.6A4.4 4.4 0 0 1 5.2 11.8L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="log-filter-body">
                        <div class="chart-filter-row chart-filter-row--selects log-filter-row--selects">
                            <label class="chart-control chart-control--device-type">
                                <span class="chart-control-label">设备类型</span>
                                <select id="eventDeviceType" data-device-type-filter disabled onchange="onDeviceTypeFilterChange(this)">
                                    <option value="qb">qB 设备</option>
                                    <option value="emby">Emby 设备</option>
                                </select>
                            </label>
                            <label class="chart-control" data-platform-panel="qb">
                                <span class="chart-control-label">设备名称</span>
                                <select id="eventInstance" onchange="loadEvents()"></select>
                            </label>
                            <label class="chart-control" data-platform-panel="emby" hidden aria-hidden="true">
                                <span class="chart-control-label">设备名称</span>
                                <select id="embyEventInstance" onchange="loadEmbyEvents()"></select>
                            </label>
                            <label class="chart-control" data-platform-panel="emby" hidden aria-hidden="true">
                                <span class="chart-control-label">日志文件</span>
                                <select id="embyEventLogType" onchange="onEmbyEventLogTypeChange()">
                                    <option value="playback" selected>新版日志</option>
                                    <option value="activity">原始日志</option>
                                </select>
                            </label>
                            <label class="chart-control" data-platform-panel="emby" data-emby-playback-user-filter hidden aria-hidden="true">
                                <span class="chart-control-label">用户名称</span>
                                <select id="embyEventPlaybackUser" onchange="onEmbyEventPlaybackUserChange()">
                                    <option value="">全部用户</option>
                                </select>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="platform-panel platform-panel--qb" data-platform-panel="qb">
                <div class="events-list" id="eventsList"></div>
                </div>
                <div class="platform-panel platform-panel--emby" data-platform-panel="emby" hidden aria-hidden="true">
                <div class="events-list" id="embyEventsList"></div>
                </div>
            </div>
        </section>

        <section id="tab-syslogs" class="tab-panel">
            <div class="syslogs-section">
                <div class="log-filter-panel">
                    <div class="log-filter-head">
                        <div class="log-filter-head-main">
                            <h2 class="log-section-title">系统日志</h2>
                            <button type="button" class="log-filter-head-refresh-btn" onclick="refreshSystemLogs()" aria-label="刷新" title="刷新">
                                <svg class="log-filter-head-refresh-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M13 3v3h-3M3 13v-3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M3.6 6.4A4.4 4.4 0 0 1 10.8 4.2L13 3M12.4 9.6A4.4 4.4 0 0 1 5.2 11.8L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="log-filter-body">
                        <div class="chart-filter-row chart-filter-row--selects log-filter-row--selects">
                            <label class="chart-control chart-control--device-type">
                                <span class="chart-control-label">日志类型</span>
                                <select id="syslogDeviceType" onchange="onSyslogTypeChange()">
                                    <option value="system" selected>系统日志</option>
                                    <option value="qb">qB 设备</option>
                                    <option value="emby">Emby 设备</option>
                                </select>
                            </label>
                            <label class="chart-control" data-platform-panel="qb">
                                <span class="chart-control-label">设备名称</span>
                                <select id="syslogInstance" onchange="loadSystemLogs()">
                                    <option value="" selected>全部设备</option>
                                </select>
                            </label>
                            <label class="chart-control" data-platform-panel="emby" hidden aria-hidden="true">
                                <span class="chart-control-label">设备名称</span>
                                <select id="embySyslogInstance" onchange="loadEmbySystemLogs()">
                                    <option value="" selected>全部设备</option>
                                </select>
                            </label>
                            <label class="chart-control">
                                <span class="chart-control-label">日志级别</span>
                                <select id="syslogLevel" onchange="onSyslogLevelChange()">
                                    <option value="">全部</option>
                                    <option value="INFO">INFO</option>
                                    <option value="WARNING">WARNING</option>
                                    <option value="ERROR">ERROR</option>
                                </select>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="platform-panel platform-panel--system" data-platform-panel="system">
                    <div class="syslogs-list" id="appSyslogsList"></div>
                </div>
                <div class="platform-panel platform-panel--qb" data-platform-panel="qb" hidden aria-hidden="true">
                    <div class="syslogs-list" id="syslogsList"></div>
                </div>
                <div class="platform-panel platform-panel--emby" data-platform-panel="emby" hidden aria-hidden="true">
                    <div class="syslogs-list" id="embySyslogsList"></div>
                </div>
            </div>
        </section>

        

        

        

        
        <script>
            if (typeof applyBootNavigationUi === 'function') applyBootNavigationUi();
        </script>
    </div>

    <div id="controlModal" class="modal">
        <div class="modal-content modal-wide">
            <div class="modal-shell-panel">
                <div class="modal-shell" tabindex="-1">
                    <span class="close" onclick="closeModal()">&times;</span>
                    <h2 id="modalTitle">控制面板</h2>
                    <div id="modalBody"></div>
                </div>
                <div class="modal-shell-rail" hidden aria-hidden="true">
                    <div class="modal-shell-rail-thumb"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal modal--stacked">
        <div class="modal-content">
            <div class="modal-shell">
                <span class="close" onclick="closeConfirmModal()">&times;</span>
                <h2 id="confirmModalTitle">确认</h2>
                <div id="confirmModalBody"></div>
            </div>
        </div>
    </div>
